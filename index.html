<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivang | Premium Invoice</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-gold: linear-gradient(135deg, #d4af37 0%, #f9e27d 50%, #b8860b 100%);
            --deep-black: #121212;
            --accent-gold: #b8860b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #f0f2f5;
            font-family: 'Inter', 'Arial', sans-serif;
            color: var(--deep-black);
            padding: 40px 10px;
        }

        .invoice-card {
            max-width: 900px;
            margin: auto;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.12);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .invoice-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 10px;
            background: var(--royal-gold);
        }

        header {
            padding: 50px 40px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #ddd;
        }

        .brand h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            color: var(--deep-black);
            margin: 0;
        }

        .brand p {
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.75rem;
            color: var(--accent-gold);
            font-weight: 700;
        }

        .contact {
            text-align: right;
            font-size: 0.9rem;
            color: #555;
            line-height: 1.6;
        }

        .meta-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 25px 40px;
            background: #fafafa;
        }

        .meta-box label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: #999;
            margin-bottom: 5px;
        }

        .meta-box input {
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 1rem;
            width: 90%;
            outline: none;
        }

        .table-area { padding: 30px 40px; }

        table { width: 100%; border-collapse: collapse; }

        th {
            text-align: left;
            padding: 15px 10px;
            font-size: 0.85rem;
            color: #555;
            border-bottom: 2px solid #eee;
            font-weight: 700;
        }

        td { padding: 12px 10px; border-bottom: 1px solid #f9f9f9; }

        input, select {
            padding: 8px;
            border: 1px solid transparent;
            border-radius: 6px;
            width: 100%;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        input:focus, select:focus {
            background: #fffdf0;
            border-color: #d4af37;
            outline: none;
        }

        .unit-select {
            background: #f3f3f3;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .row-total { font-weight: 700; text-align: right; font-size: 1.1rem; }

        .footer-grid {
            padding: 30px 40px 50px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .total-card {
            width: 320px;
            background: var(--deep-black);
            padding: 25px;
            border-radius: 20px;
            color: #fff;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1rem;
            opacity: 0.8;
        }

        .grand-total {
            border-top: 1px solid #333;
            margin-top: 15px;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 1.8rem;
            font-weight: 700;
            color: #f9e27d;
        }

        .btn-group {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 14px 30px;
            border-radius: 50px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.85rem;
        }

        .btn-add { background: #fff; border: 2px solid #eee; color: #555; }
        .btn-print { background: var(--royal-gold); color: #fff; box-shadow: 0 8px 15px rgba(184,134,11,0.3); }
        .btn:hover { transform: translateY(-3px); }

        .del-btn-cell { text-align: center; }
        .del-btn { color: #ff4d4d; border: none; background: none; font-size: 1.5rem; cursor: pointer; }

        /* --- PRINT SETTINGS --- */
        @media print {
            .btn-group, .btn-add, .del-btn-cell { display: none !important; }
            
            body { background: white; padding: 0; }
            .invoice-card { box-shadow: none; border: none; width: 100%; max-width: 100%; border-radius: 0; }

            /* भाव (Rate) वाले कॉलम को पूरी तरह गायब करने के लिए */
            .rate-col { display: none !important; }
            
            /* सामान के नाम को थोड़ा और बड़ा करने के लिए ताकि बैलेंस बना रहे */
            th:first-child, td:first-child { width: 55% !important; }

            select {
                appearance: none;
                -webkit-appearance: none;
                border: none !important;
                background: none !important;
                padding: 0 !important;
            }

            input {
                border: none !important;
                background: none !important;
            }
        }
    </style>
</head>
<body>

<div class="invoice-card">
    <header>
        <div class="brand">
            <h1>SHIVANG</h1>
            <p>General Store</p>
        </div>
        <div class="contact">
            <strong>रिकीविपुर भवानीगंज</strong><br>
            जौनपुर, उत्तर प्रदेश<br>
            मोबाइल: 9984824292
        </div>
    </header>

    <div class="meta-section">
        <div class="meta-box">
            <label>बिल नंबर</label>
            <input type="text" value="#SGS-2026-001">
        </div>
        <div class="meta-box">
            <label>तारीख</label>
            <input type="text" id="billDate">
        </div>
        <div class="meta-box">
            <label>ग्राहक का नाम</label>
            <input type="text" placeholder="नकद ग्राहक">
        </div>
    </div>

    <div class="table-area">
        <table>
            <thead>
                <tr>
                    <th width="40%">सामान का नाम</th>
                    <th width="15%">मात्रा</th>
                    <th width="15%">यूनिट</th>
                    <th width="15%" class="rate-col">भाव (₹)</th> 
                    <th width="15%" style="text-align:right">कुल</th>
                    <th width="5%" class="del-btn-cell"></th>
                </tr>
            </thead>
            <tbody id="billBody"></tbody>
        </table>
        <button class="btn btn-add" style="margin-top: 20px" onclick="addRow()">+ नया सामान जोड़ें</button>
    </div>

    <div class="footer-grid">
        <div style="color: #999; font-size: 0.85rem;">
            * पधारने के लिए धन्यवाद! <br> कृपया सामान का मिलान कर लें।
        </div>
        <div class="total-card">
            <div class="total-row">
                <span>कुल सामान</span>
                <span id="itemCount">0</span>
            </div>
            <div class="grand-total">
                <span>कुल राशि</span>
                <span>₹ <span id="grandTotal">0.00</span></span>
            </div>
        </div>
    </div>
</div>

<div class="btn-group">
    <button class="btn btn-print" onclick="window.print()">बिल प्रिंट करें</button>
</div>

<script>
    document.getElementById("billDate").value = new Date().toLocaleDateString('hi-IN', {
        day: '2-digit', month: 'long', year: 'numeric'
    });

    function addRow() {
        const tbody = document.getElementById("billBody");
        const row = tbody.insertRow();
        row.innerHTML = `
            <td><input type="text" placeholder="सामान का नाम लिखें..."></td>
            <td><input type="number" value="1" step="any" oninput="calculate()"></td>
            <td>
                <select class="unit-select" onchange="calculate()">
                    <option value="kg">किलो</option>
                    <option value="gm">ग्राम</option>
                    <option value="pcs">पीस</option>
                    <option value="ltr">लीटर</option>
                    <option value="pkt">पैकेट</option>
                </select>
            </td>
            <td class="rate-col"><input type="number" placeholder="0.00" oninput="calculate()"></td>
            <td class="row-total">0.00</td>
            <td class="del-btn-cell"><button class="del-btn" onclick="this.parentElement.parentElement.remove(); calculate()">×</button></td>
        `;
        calculate();
    }

    function calculate() {
        const rows = document.querySelectorAll("#billBody tr");
        let grandTotal = 0;

        rows.forEach(row => {
            const qty = parseFloat(row.cells[1].querySelector('input').value) || 0;
            const unit = row.cells[2].querySelector('select').value;
            const rateInput = row.cells[3].querySelector('input');
            const rate = parseFloat(rateInput.value) || 0;
            
            let total = 0;
            if (unit === 'gm') {
                total = (qty / 1000) * rate;
            } else {
                total = qty * rate;
            }

            row.cells[4].innerText = total.toFixed(2);
            grandTotal += total;
        });

        const formattedTotal = grandTotal.toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById("grandTotal").innerText = formattedTotal;
        document.getElementById("itemCount").innerText = rows.length;
    }

    for(let i=0; i<3; i++) addRow();
</script>

</body>
</html>
