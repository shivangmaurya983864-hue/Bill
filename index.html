<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivang | Elite Invoice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.85);
            --gold-gradient: linear-gradient(135deg, #c5a059 0%, #f1dca7 50%, #b8975a 100%);
            --dark: #121212;
            --soft-text: #555;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            min-height: 100vh;
            padding: 60px 20px;
        }

        .invoice-container {
            max-width: 900px;
            margin: auto;
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 60px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 50px 100px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        /* Decorative Gold Bar */
        .invoice-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: var(--gold-gradient);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 80px;
        }

        .logo-section h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            letter-spacing: -1px;
            line-height: 1;
        }

        .logo-section span {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #b8975a;
            font-weight: 700;
        }

        .header-contact {
            text-align: right;
            font-size: 0.85rem;
            color: var(--soft-text);
            line-height: 1.6;
        }

        .bill-meta {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 50px;
            padding: 25px;
            background: rgba(0,0,0,0.02);
            border-radius: 15px;
        }

        .meta-box label {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 5px;
        }

        .meta-box input {
            background: transparent;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            color: var(--dark);
            width: 100%;
            outline: none;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 15px;
        }

        th {
            text-align: left;
            padding: 10px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            border-bottom: 1px solid #eee;
        }

        td {
            background: #fff;
            padding: 20px 15px;
            transition: 0.3s;
        }

        td:first-child { border-radius: 12px 0 0 12px; }
        td:last-child { border-radius: 0 12px 12px 0; }

        input, select {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
        }

        .row-total {
            font-weight: 700;
            text-align: right;
            font-size: 1rem;
        }

        .summary {
            margin-top: 50px;
            display: flex;
            justify-content: flex-end;
        }

        .total-card {
            width: 320px;
            padding: 30px;
            background: var(--dark);
            color: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .total-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .grand-total {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
            margin-top: 15px;
            font-size: 1.6rem;
            font-weight: 700;
            color: #f1dca7;
        }

        .btn-group {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 15px 35px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .btn-add { background: #fff; color: var(--dark); border: 1px solid #ddd; }
        .btn-add:hover { background: #f9f9f9; transform: translateY(-2px); }

        .btn-print { 
            background: var(--gold-gradient); 
            color: #fff; 
            box-shadow: 0 10px 20px rgba(184,151,90,0.3);
        }
        .btn-print:hover { opacity: 0.9; transform: translateY(-2px); }

        .delete-btn {
            color: #ff4d4d;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
        }

        @media print {
            body { background: #fff; padding: 0; }
            .invoice-container { box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 0; }
            .btn-group, .delete-btn { display: none !important; }
            td { background: #f9f9f9; border-bottom: 1px solid #eee; }
            .total-card { background: #121212 !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="invoice-container">
    <header>
        <div class="logo-section">
            <h1>Shivang</h1>
            <span>General Store</span>
        </div>
        <div class="header-contact">
            <strong>Rikevipur bhawaniganj</strong><br>
            9984824292<br>
            
        </div>
    </header>

    <div class="bill-meta">
        <div class="meta-box">
            <label>Invoice Number</label>
            <input type="text" value="#SGS-2026-99" readonly>
        </div>
        <div class="meta-box">
            <label>Date of Sale</label>
            <input type="text" id="currentDate">
        </div>
        <div class="meta-box">
            <label>Customer Name</label>
            <input type="text" placeholder="GUEST CUSTOMER">
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th width="40%">Item Description</th>
                <th width="15%">Quantity</th>
                <th width="15%">Unit</th>
                <th width="15%">Rate (₹)</th>
                <th width="15%" style="text-align: right;">Total</th>
                <th width="5%"></th>
            </tr>
        </thead>
        <tbody id="billBody">
            </tbody>
    </table>

    <div class="btn-group">
        <button class="btn btn-add" onclick="addRow()">+ Add New Experience</button>
    </div>

    <div class="summary">
        <div class="total-card">
            <div class="total-line">
                <span>Total Items</span>
                <span id="itemCount">0</span>
            </div>
            <div class="total-line">
                <span>Subtotal</span>
                <span>₹ <span id="subTotal">0.00</span></span>
            </div>
            <div class="grand-total">
                <span>₹ <span id="grandTotal">0.00</span></span>
            </div>
        </div>
    </div>
</div>

<div class="btn-group">
    <button class="btn btn-print" onclick="window.print()">Print Official Invoice</button>
</div>

<script>
    document.getElementById("currentDate").value = new Date().toLocaleDateString('hi-IN', {
        day: '2-digit', month: 'long', year: 'numeric'
    });

    const products = [
        { n: "Premium Red Abir", q: 100, u: "gm", r: 10 },
        { n: "Premium Yellow Abir", q: 100, u: "gm", r: 10 },
        { n: "Fresh Ginger (High Quality)", q: 500, u: "gm", r: 42 },
        { n: "Organic Farm Tomatoes", q: 2, u: "kg", r: 32 }
    ];

    function addRow(data = {n: "", q: 0, u: "kg", r: 0}) {
        const tbody = document.getElementById("billBody");
        const row = tbody.insertRow();

        row.innerHTML = `
            <td><input type="text" value="${data.n}" placeholder="Enter item name..."></td>
            <td><input type="number" value="${data.q}" oninput="calculate()"></td>
            <td>
                <select onchange="calculate()">
                    <option value="kg" ${data.u === 'kg' ? 'selected' : ''}>kg</option>
                    <option value="gm" ${data.u === 'gm' ? 'selected' : ''}>gm</option>
                    <option value="pc" ${data.u === 'pc' ? 'selected' : ''}>pc</option>
                </select>
            </td>
            <td><input type="number" value="${data.r}" oninput="calculate()"></td>
            <td class="row-total">0.00</td>
            <td style="text-align: center;"><button class="delete-btn" onclick="removeRow(this)">✕</button></td>
        `;
        calculate();
    }

    function calculate() {
        const rows = document.getElementById("billBody").rows;
        let grandTotal = 0;

        for (let row of rows) {
            let qty = parseFloat(row.cells[1].querySelector('input').value) || 0;
            let unit = row.cells[2].querySelector('select').value;
            let rate = parseFloat(row.cells[3].querySelector('input').value) || 0;
            
            let total = (unit === "gm") ? (qty / 1000) * rate : qty * rate;
            
            row.querySelector('.row-total').innerText = total.toFixed(2);
            grandTotal += total;
        }

        document.getElementById("grandTotal").innerText = grandTotal.toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById("subTotal").innerText = grandTotal.toLocaleString('en-IN', {minimumFractionDigits: 2});
        document.getElementById("itemCount").innerText = rows.length;
    }

    function removeRow(btn) {
        btn.closest('tr').remove();
        calculate();
    }

    // Initial Load
    products.forEach(p => addRow(p));
</script>

</body>
</html>
